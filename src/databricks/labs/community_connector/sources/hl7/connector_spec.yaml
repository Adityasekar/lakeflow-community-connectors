# HL7 v2 Community Connector Spec
# This file defines the specification for the connector including
# connection parameters and allowlist options.
#
# This connector ingests HL7 v2 message files (.hl7 / .txt) from a
# Databricks Unity Catalog Volume path. Each HL7 segment type becomes
# its own Delta table, enabling structured analytics over clinical data.
#
# Supported tables (segment types):
#   msh  - Message Header              evn  - Event Type
#   pid  - Patient Identification      pd1  - Patient Additional Demographic
#   pv1  - Patient Visit               pv2  - Patient Visit Additional
#   nk1  - Next of Kin / Associated    mrg  - Merge Patient Information
#   al1  - Patient Allergy             iam  - Patient Adverse Reaction
#   dg1  - Diagnosis                   pr1  - Procedures
#   orc  - Common Order                obr  - Observation Request
#   obx  - Observation Result          nte  - Notes and Comments
#   spm  - Specimen                    in1  - Insurance
#   gt1  - Guarantor                   ft1  - Financial Transaction
#   rxa  - Pharmacy/Treatment Admin    sch  - Scheduling Activity
#   txa  - Transcription Document
#
# Custom / Z-segments are supported via the segment_type table option.
# The connector uses file modification timestamp (mtime) as an incremental
# cursor and processes files in batches to manage memory and throughput.

# ============================================================================
# Connection Parameters
# These are provided when creating the Unity Catalog connection.
# ============================================================================
display_name: HL7 v2
connection:
  parameters:
    - name: volume_path
      type: string
      required: true
      description: >
        Path to the Unity Catalog Volume directory containing HL7 v2 message
        files. Must be accessible to the pipeline compute.
        Example: /Volumes/healthcare/raw/hl7_feed/

    - name: file_pattern
      type: string
      required: false
      description: >
        Glob pattern used to match HL7 files within the volume_path.
        Defaults to *.hl7. Use **/*.hl7 for recursive directory search,
        or *.txt if files use the .txt extension.

# ============================================================================
# External Options Allowlist
# These table-specific options can be passed per-table in the pipeline
# configuration via externalOptionsAllowList on the UC connection.
# Options include:
#   - segment_type: Override the segment type for the table (for custom/Z-segments)
#   - max_records_per_batch: Maximum number of records to read in a micro-batch
#                             (applies per table; connector-level default is 10,000)
# ============================================================================
external_options_allowlist: "segment_type,max_records_per_batch"
